<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saujana Link Repositori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-royal-blue { background-color: #002366; }
        .text-royal-blue { color: #002366; }
        .btn-royal { background-color: #002366; color: white; transition: 0.3s; font-weight: 700; }
        .btn-royal:hover { background-color: #001a4d; transform: translateY(-1px); }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-box { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: #002366; ring: 2px; ring-color: rgba(0,35,102,0.1); }
    </style>
</head>
<body class="pb-12">

    <header class="bg-royal-blue text-white p-6 shadow-2xl border-b-4 border-yellow-500">
        <div class="container mx-auto flex flex-col md:flex-row items-center gap-6">
            <img src="https://i.postimg.cc/SN3YKfvk/smksi.png" alt="Logo SMKSI" class="w-20 bg-white p-2 rounded-xl shadow-lg">
            <div class="text-center md:text-left">
                <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight">SAUJANA LINK REPOSITORI</h1>
                <p class="text-xs md:text-sm opacity-90 uppercase tracking-widest mt-1 font-medium">SMK Saujana Impian | KM 22, Jalan Cheras, Kajang</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="card p-6 border-t-8 border-royal-blue">
                    <h2 class="text-xl font-bold mb-6 text-royal-blue flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i> Tambah Pautan
                    </h2>
                    <form id="linkForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Nama Pautan</label>
                            <input type="text" id="nama" required class="input-box" placeholder="Cth: PBD">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Kategori</label>
                            <select id="kategori" required class="input-box">
                                <option value="Kurikulum">Kurikulum</option>
                                <option value="HEM">HEM</option>
                                <option value="Kokurikulum">Kokurikulum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">URL Web Link</label>
                            <input type="url" id="url" required class="input-box" placeholder="https://...">
                        </div>
                        <button type="submit" id="btnSimpan" class="w-full btn-royal py-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> SIMPAN
                        </button>
                    </form>
                </div>

                <div class="card p-6">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Statistik Kategori</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="card p-6">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-xl font-bold text-royal-blue flex items-center gap-2">
                            <i class="fas fa-folder-open"></i> Semua Pautan Digital
                        </h2>
                        <div class="flex gap-2 w-full md:w-auto">
                            <div class="relative flex-grow">
                                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" id="search" placeholder="Cari..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm w-full outline-none focus:ring-1 focus:ring-royal-blue">
                            </div>
                            <button onclick="generatePDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-red-700 transition">
                                <i class="fas fa-file-pdf mr-1"></i> PDF
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto border border-gray-100 rounded-xl">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr>
                                    <th class="p-4 text-xs font-bold text-gray-500 uppercase">Maklumat Bahan</th>
                                    <th class="p-4 text-xs font-bold text-gray-500 uppercase text-center">Kategori</th>
                                    <th class="p-4 text-xs font-bold text-gray-500 uppercase text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class
